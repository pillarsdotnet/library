apiVersion: v1
kind: Namespace
metadata:
  name: home-library
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-library
  namespace: home-library
  labels:
    app: home-library
spec:
  replicas: 1
  # Single SQLite file on a node-local hostPath, so never run two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-library
  template:
    metadata:
      labels:
        app: home-library
    spec:
      # Pin to the homelab node so the hostPath database is always the same disk.
      nodeSelector:
        kubernetes.io/hostname: homelab
      containers:
        - name: web
          image: library.local/home-library:1.0.0
          imagePullPolicy: IfNotPresent   # image is imported into containerd, not pulled
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: BASE_PATH
              value: "/library"
            - name: DB_PATH
              value: "/data/library.db"
          readinessProbe:
            httpGet:
              path: /library/api/meta
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /library/
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /var/lib/home-library
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: home-library
  namespace: home-library
  labels:
    app: home-library
spec:
  type: NodePort
  selector:
    app: home-library
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30800

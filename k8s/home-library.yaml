apiVersion: v1
kind: Namespace
metadata:
  name: home-library
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-library
  namespace: home-library
  labels:
    app: home-library
spec:
  replicas: 1
  # Single SQLite file on a node-local hostPath, so never run two pods at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-library
  template:
    metadata:
      labels:
        app: home-library
    spec:
      # Pin to the homelab node so the hostPath database is always the same disk.
      nodeSelector:
        kubernetes.io/hostname: homelab
      # This app only calls external APIs (Open Library / Google Books) + local
      # SQLite — it never needs cluster DNS. Resolve via public DNS directly so
      # ISBN lookups don't depend on CoreDNS (which currently fails to resolve
      # external names for pods).
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8
        options:
          - name: ndots
            value: "1"
      containers:
        - name: web
          image: library.local/home-library:1.0.0
          imagePullPolicy: IfNotPresent   # image is imported into containerd, not pulled
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: BASE_PATH
              value: "/library"
            - name: DB_PATH
              value: "/data/library.db"
            # Optional: raises the Google Books lookup quota well above the tiny
            # keyless daily limit. Create the secret to enable it (see README):
            #   kubectl -n home-library create secret generic home-library-secrets \
            #     --from-literal=google-books-api-key=YOUR_KEY
            - name: GOOGLE_BOOKS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: home-library-secrets
                  key: google-books-api-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /library/api/meta
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /library/
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /var/lib/home-library
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: home-library
  namespace: home-library
  labels:
    app: home-library
spec:
  type: NodePort
  selector:
    app: home-library
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30800

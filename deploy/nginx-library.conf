# Reverse-proxy snippet for the host nginx on the `homelab` node.
# Add these blocks inside the `server { listen 80; ... }` block
# (e.g. /etc/nginx/sites-available/default), then: nginx -t && systemctl reload nginx
#
# The app is served under /library by the container (BASE_PATH=/library), so the
# path is forwarded unchanged to the NodePort — no rewriting needed.

location = /library {
    return 301 /library/;
}

location /library/ {
    proxy_pass http://127.0.0.1:30800;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
